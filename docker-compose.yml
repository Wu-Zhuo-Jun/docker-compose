version: "3.8"

services:
  backend:
    build:
      context: ./backend # 构建上下文是 backend 目录
      dockerfile: Dockerfile
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app # 热更新（开发环境）
    depends_on:
      chromadb:
        condition: service_started
    environment:
      - VECTOR_DB_HOST=chromadb
      - VECTOR_DB_PORT=8000
    networks:
      - app_network

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb_service
    ports:
      - "8001:8001"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8001/api/v1/heartbeat || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  chroma_data:

networks:
  app_network:
    driver: bridge
