services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_data
    environment:
      - CHROMA_PERSIST_DIR=/app/chroma_data
    networks:
      - app_network

volumes:
  chroma_data:

networks:
  app_network:
    driver: bridge
