services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_data
      - embedding_models:/app/models
    env_file:
      - .env
    environment:
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - EMBEDDING_CACHE_DIR=/app/models
    networks:
      - app_network

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb_service
    ports:
      - "8001:8001"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/api/v1/heartbeat || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s

  # frontend:
