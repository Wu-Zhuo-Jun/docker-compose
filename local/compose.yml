services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_data
      - embedding_models:/app/models
    env_file:
      - .env
    environment:
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - EMBEDDING_CACHE_DIR=/app/models
      - HF_HUB_OFFLINE=1
      - HF_HOME=/app/models
    networks:
      - app_network

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb_service
    ports:
      - "8001:8001"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/api/v1/heartbeat || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 前端 docker 服务默认注释。
  # 本地开发推荐直接：cd frontend && npm run dev（Vite 8002 端口，proxy 到 localhost:8000）
  # 如需在 docker 中跑前端，请取消下方注释并修改 Dockerfile 端口（如改用 nginx build 模式）：
  #
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: react_frontend
  #   ports:
  #     - "8002:80"
  #   networks:
  #     - app_network

  postgres:
    image: postgres:16-alpine
    container_name: postgres_service
    restart: unless-stopped
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-MyAgentApp}
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-MyAgentApp}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  chroma_data:
  embedding_models:
  postgres_data:

networks:
  app_network:
    driver: bridge
