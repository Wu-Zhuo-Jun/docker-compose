# ============================================================
# frontend/nginx.conf
# ============================================================
# 默认配置：仅服务静态文件（SPA fallback）+ /api 反代到 backend
#
# Zeabur 上通过 ${BACKEND_HOSTNAME}:8000 直连 backend 容器；
# 本地 docker-compose 通过环境变量 API_UPSTREAM 注入上游地址
# （如 http://backend:8000）。
# ============================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # /api 反代到 FastAPI 后端
    location /api/ {
        proxy_pass         ${API_UPSTREAM}/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 静态资源 + SPA fallback（React Router 刷新不 404）
    root /usr/share/nginx/html;
    index index.html;

    # 启用 gzip 压缩（节省带宽，特别是大陆访问）
    gzip on;
    gzip_vary on;
    gzip_static on;  # 直接服务预压缩的 .gz 文件
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # 不缓存 index.html（HMR 替代品：部署即生效）
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # 带 hash 的静态资源（Vite 默认输出）可永久缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback：所有未匹配的路径返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
