# ============================================================
# frontend/nginx.conf
# ============================================================
# 默认配置：仅服务静态文件（SPA fallback）
#   /api  反代由 Zeabur 域名 path 转发处理（无需 nginx 反代）
#
# 本地 docker-compose 启用 frontend 时：
#   - 把 /api 反代打开，指向 backend:8000
#   - 在 docker-compose.yml 中加上：
#       environment:
#         - API_UPSTREAM=http://backend:8000
# ============================================================

# Zeabur 通过域名 path 转发把 /api/* 直接打到 backend service，
# 所以这里不需要再反代。
# 本地 docker-compose 启用 frontend 时，取消下面这块注释即可。
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }
#
# location /api/ {
#     proxy_pass         http://backend:8000/;
#     proxy_http_version 1.1;
#     proxy_set_header   Host              $host;
#     proxy_set_header   X-Real-IP         $remote_addr;
#     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
#     proxy_set_header   X-Forwarded-Proto $scheme;
#     proxy_read_timeout 60s;
# }

server {
    listen 80;
    server_name _;

    # 静态资源 + SPA fallback（React Router 刷新不 404）
    root /usr/share/nginx/html;
    index index.html;

    # 启用 gzip 压缩（节省带宽，特别是大陆访问）
    gzip on;
    gzip_vary on;
    gzip_static on;  # 直接服务预压缩的 .gz 文件
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # 不缓存 index.html（HMR 替代品：部署即生效）
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # 带 hash 的静态资源（Vite 默认输出）可永久缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback：所有未匹配的路径返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
